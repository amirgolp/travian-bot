# Egyptian economy build guide for x10 speed servers ("Ark 1" variant).
# Source: samples/legend/X10 Egyptian Eco - Ark1.pdf
#
# Conventions:
#   - `step` mirrors the row number in the PDF.
#   - Paired actions on the same PDF row (e.g. "Warehouse 1 / Granary 1") are
#     encoded as two sibling entries with the same `step` id.
#   - "All Wood to 1" → `fields: {type: woodcutter, count: 4, level: 1}`.
#     The compiler emits one BuildOrder per slot; the controller picks which.
#   - "One Wood to 2" → count: 1 (earmarks a single slot).
#   - Steps needing human judgement or a policy change are `gate:` entries.
#
# Buildings not yet present in app/data/buildings.yaml (town_hall, tribe-specific
# wall variants) have been omitted or mapped to the closest available key;
# expand buildings.yaml and uncomment the TODO entries below when needed.

meta:
  name: X10 Egyptian Eco - Ark1
  tribe: egyptian
  server_speed: 10
  goal: fastest_settle
  source: samples/legend/X10 Egyptian Eco - Ark1.pdf

build:
  - step: 1
    note: Send hero to closest adventure the moment you spawn (tier 1 horse gifted).
    hero: { action: adventure, detail: closest }

  - step: 2
    note: Activate 25% Plus — production boost; repays itself in a day at x10.
    hero: { action: toggle_plus }

  - step: 3
    building: { key: main_building, level: 3 }

  - step: 4
    building: { key: warehouse, level: 1 }
  - step: 4
    building: { key: granary, level: 1 }

  - step: 5
    building: { key: marketplace, level: 1 }

  - step: 7
    building: { key: marketplace, level: 3 }

  - step: 8
    fields: { type: cropland, count: 1, level: 1 }

  - step: 9
    building: { key: embassy, level: 1 }

  - step: 10
    note: PDF says "Wall 3" (Egyptian Waterditch) — mapped to city_wall pending tribe walls.
    building: { key: city_wall, level: 3 }

  - step: 11
    building: { key: cranny, level: 6 }

  - step: 12
    fields: { type: woodcutter, count: 4, level: 1 }
  - step: 13
    fields: { type: clay_pit, count: 4, level: 1 }
  - step: 14
    fields: { type: cropland, count: 6, level: 1 }

  - step: 15
    fields: { type: cropland, count: 2, level: 2 }
  - step: 16
    fields: { type: iron_mine, count: 4, level: 1 }
  - step: 17
    fields: { type: clay_pit, count: 1, level: 2 }

  - step: 18
    note: Completed at beginning per PDF — retained for priority ordering.
    fields: { type: woodcutter, count: 1, level: 2 }
  - step: 19
    fields: { type: iron_mine, count: 1, level: 2 }
  - step: 20
    fields: { type: cropland, count: 4, level: 2 }
  - step: 21
    fields: { type: clay_pit, count: 3, level: 2 }
  - step: 22
    fields: { type: woodcutter, count: 3, level: 2 }
  - step: 23
    fields: { type: iron_mine, count: 3, level: 2 }

  - step: 24
    building: { key: granary, level: 3 }
  - step: 25
    building: { key: warehouse, level: 3 }

  - step: 26
    gate:
      kind: hero_mode
      rule: >
        If raid targets exist, raid with hero; else keep doing adventures.
        Put 1-3 points into str, the rest into production; or go full str + full raid
        if the oasis/raid density supports it.

  - step: 27
    building: { key: barracks, level: 1 }

  - step: 28
    fields: { type: woodcutter, count: 1, level: 4 }
  - step: 29
    fields: { type: clay_pit, count: 1, level: 4 }
  - step: 30
    fields: { type: cropland, count: 1, level: 4 }
  - step: 31
    fields: { type: iron_mine, count: 1, level: 4 }

  - step: 32
    building: { key: barracks, level: 3 }
  - step: 33
    building: { key: academy, level: 1 }

  - step: 34
    fields: { type: woodcutter, count: 4, level: 3 }
  - step: 35
    fields: { type: clay_pit, count: 4, level: 3 }
  - step: 36
    fields: { type: cropland, count: 6, level: 3 }
  - step: 37
    fields: { type: iron_mine, count: 4, level: 3 }

  - step: 42
    building: { key: smithy, level: 1 }

  - step: 43
    gate:
      kind: clear_oases
      rule: >
        Clear as many close oases as you can; fetch the Book from Adv 6 ASAP and
        convert hero attributes to resource production if not done already.

  - step: 44
    building: { key: residence, level: 1 }
  - step: 45
    building: { key: granary, level: 4 }
  - step: 46
    building: { key: warehouse, level: 4 }
  - step: 47
    building: { key: main_building, level: 7 }
  - step: 48
    building: { key: academy, level: 10 }
  - step: 49
    building: { key: workshop, level: 1 }

  # Step 50 in PDF is "Townhall to 1" — pending town_hall entry in buildings.yaml.

  - step: 52
    building: { key: granary, level: 7 }
  - step: 53
    building: { key: warehouse, level: 7 }
  - step: 54
    building: { key: warehouse, level: 8 }

  - step: 57
    building: { key: residence, level: 10 }

  - step: 58
    note: Train 3 settlers — encoded under `troops` as a unit goal, not a building.

  - step: 59
    note: Party 1 if missing CP; otherwise build more crannies.
    building: { key: cranny, level: 10 }

  - step: 60
    gate:
      kind: settle
      prompt: Ask team leader where to settle when 3 settlers are cooking.

hero:
  adventure_rewards:
    - { index: 1,  prefer: horse }
    - { index: 2,  prefer: resources }
    - { index: 3,  prefer: troops }
    - { index: 4,  prefer: silver }
    - { index: 5,  prefer: ointments }
    - { index: 6,  prefer: books, post: convert_to_resources }
    - { index: 7,  prefer: resources }
    - { index: 8,  prefer: silver }
    - { index: 9,  prefer: cages }
    - { index: 10, prefer: xp }

troops:
  # PDF: "1 slave = 150 res; 143 sec at Barracks 3; 210 slaves ≈ 8h20m, 31,500 res."
  - after_step: 32
    troop: t1
    target: 210
    note: Egyptian slave militia — early raid filler once barracks hits level 3.
