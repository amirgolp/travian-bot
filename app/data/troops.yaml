# Per-tribe troop roster (t1..t10), indexed in order.
# Only names + training building are encoded — we don't need stats for the
# training controller. Add more tribes here as you play them; everything
# else in the stack is already tribe-agnostic (positional t1..t10 keys).
#
# `building` is one of: barracks | stable | workshop | residence
# - barracks  = gid 19
# - stable    = gid 20
# - workshop  = gid 21
# - residence = gid 25 (chiefs/settlers)

tribes:
  roman:
    t1: { name: "Legionnaire",          building: barracks }
    t2: { name: "Praetorian",           building: barracks }
    t3: { name: "Imperian",             building: barracks }
    t4: { name: "Equites Legati",       building: stable }
    t5: { name: "Equites Imperatoris",  building: stable }
    t6: { name: "Equites Caesaris",     building: stable }
    t7: { name: "Battering Ram",        building: workshop }
    t8: { name: "Fire Catapult",        building: workshop }
    t9: { name: "Senator",              building: residence }
    t10: { name: "Settler",             building: residence }

  teuton:
